- name: configure shipping component
  hosts: shipping
  become: yes
  tasks:
  - name: install maven
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: installed
    loop:
      
      - mysql
      - maven
  - name: install pymysql
    ansible.builtin.pip:
      name: "{{ item }}"
      executable: pip3.9
    loop:
    - cryptography
    - pymysql
  - name: create system user
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin
      system: true
      home: /app
  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory
  - name: download shipping code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
      dest: /tmp/shipping.zip
   # this module thinks file exist on ansible control server, needs to extract on to remote machine
   # remote_src: yes means files already exist in catalogue server
  - name: extract shipping-code
    ansible.builtin.unarchive:
       src: /tmp/catalogue.zip
       dest: /app
       remote_src: true

  - name: install maven dependencies
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app
  - name: rename jar file
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
    args:
     chdir: /app
  - name: copy shipping service
    ansible.builtin.copy:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service

  - name: daemon reload
    ansible.builtin.systemd_service:
     daemon_reload: true
  - name: enable and start shipping
    ansible.builtin.service:
      name: shipping
      state: started
      enabled: yes
 
  # - name: connect to mysql
  #   community.mysql.mysql_info:
  #     login_user: shipping
  #     login_password: RoboShop@1
  #     login_host: mysql.banasurekha.shop
  #     login_db: cities
  - name: import data
    community.mysql.mysql_db:
       login_user: root
       login_password: RoboShop@1
       login_host: mysql.banasurekha.shop
       state: import
       target: "{{ item }}"
    loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql /app/db/master-data.sql
  - name: restart shipping
    ansible.builtin.service:
      state: restarted
      name: shipping
